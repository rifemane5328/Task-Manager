{% extends 'base.html' %}
{% load crispy_forms_tags %}

<!-- Navbar -->
{% block nav %}
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Task-Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <!-- aria-current="page" -->
                <a class="nav-link" aria-current="page" href="{% url 'accounts:login' %}">Увійти</a>
                <a class="nav-link" aria-current="page" href="{% url 'accounts:register' %}">Зареєструватися</a>
            </div>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center"">
    <div style="max-width: 500px; width: 100%;">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">Реєстрація</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}

                    <button type="submit" class="btn btn-primary w-100 mt-3">Зареєструватися</button>
                </form>
                <p>
                    Вже є акаунт? <a href="{% url 'accounts:login' %}">Увійти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
