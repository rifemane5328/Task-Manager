{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}
<div class="container my-3 flex-grow-1">
    <div class="position-absolute top-0 start-0 p-3">
        <label class="switch" id="themeToggle">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="d-flex justify-content-center align-items-center">
        <div style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none fw-bold fs-4 text-body">
                    Task-Manager
                </a>
            </div>
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">Оновлення паролю</h2>
                    <p class="text-muted"></p>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100 mt-3">Змінити пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
