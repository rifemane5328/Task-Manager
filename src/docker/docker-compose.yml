services:

  db:
    image: postgres:18
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${PG_DB:-task_manager}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"

  web:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../../src:/app 
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile
    command: celery -A task_manager worker --loglevel=info
    volumes:
      - ../../src:/app 
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: